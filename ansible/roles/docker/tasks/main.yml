---
- name: Docker installation
  become: true
  tags:
    - docker_install
    - docker
  block:
  - name: Install prerequisites
    ansible.builtin.apt:
      name:
        - ca-certificates
        - curl
        - gnupg
        - lsb-release
      state: present

  - name: Add Docker GPG key
    apt_key:
      url: https://download.docker.com/linux/ubuntu/gpg
      state: present

  - name: Add Docker repository
    apt_repository:
      repo: "deb https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
      state: present

  - name: Update apt cache after adding Docker repo
    ansible.builtin.apt:
      update_cache: true

  - name: Install Docker packages
    ansible.builtin.apt:
      name: "{{ docker_packages }}"
      state: present
    notify: restart docker

  - name: Install Docker
    ansible.builtin.apt:
      name: docker-ce
      state: present
    notify: restart docker
  rescue:
    - name: Remove old Docker repository if exists
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/docker.list
        state: absent

    - name: Remove old Docker source list if exists
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/download_docker_com_linux_ubuntu.list
        state: absent

    - name: Clean apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 0
      ignore_errors: true

    - name: Retry on failure
      pause:
        seconds: 10

    - name: Retry apt update
      ansible.builtin.apt:
        update_cache: true
        force_apt_get: true
  always:
    - name: Ensure Docker service is running and enabled
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true
    - name: Log completion
      debug:
        msg: "Docker Installation attempted"


- name: Docker conf
  become: true
  tags:
    - docker_config
    - docker
  block:
  - name: Add user to docker group
    ansible.builtin.user:
      name: "{{ docker_user }}"
      groups: docker
      append: true

  - name: Install python3-docker for Ansible docker modules
    ansible.builtin.apt:
      name: python3-docker
      state: present

  always:
    - name: Ensure Docker service is running and enabled
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true
    - name: Log completion
      ansible.builtin.debug:
        msg: "Docker Configuration attempted"
