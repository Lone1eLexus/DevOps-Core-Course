---
- name: Docker installation
  block:
  - name: Install prerequisites
    apt:
      name:
        - ca-certificates
        - curl
        - gnupg
        - lsb-release
      state: present

  - name: Add Docker GPG key
    apt_key:
      url: https://download.docker.com/linux/ubuntu/gpg
      state: present

  - name: Add Docker repository
    apt_repository:
      repo: "deb https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
      state: present

  - name: Update apt cache after adding Docker repo
    apt:
      update_cache: yes

  - name: Install Docker packages
    apt:
      name: "{{ docker_packages }}"
      state: present
    notify: restart docker

  - name: Install Docker
    apt:
      name: docker-ce
      state: present
    notify: restart docker
  rescue:
    - name: Remove old Docker repository if exists
      file:
        path: /etc/apt/sources.list.d/docker.list
        state: absent

    - name: Remove old Docker source list if exists
      file:
        path: /etc/apt/sources.list.d/download_docker_com_linux_ubuntu.list
        state: absent

    - name: Clean apt cache
      apt:
        update_cache: yes
        cache_valid_time: 0
      ignore_errors: yes

    - name: Retry on failure
      pause:
        seconds: 10

    - name: Retry apt update
      apt:
        update_cache: yes
        force_apt_get: yes
  always:
    - name: Ensure Docker service is running and enabled
      service:
        name: docker
        state: started
        enabled: yes
    - name: Log completion
      debug:
        msg: "Docker Installation attempted"
  become: true
  tags:
    - docker_install
    - docker



- name: Docker conf
  block:
  - name: Add user to docker group
    user:
      name: "{{ docker_user }}"
      groups: docker
      append: yes

  - name: Install python3-docker for Ansible docker modules
    apt:
      name: python3-docker
      state: present

  always:
    - name: Ensure Docker service is running and enabled
      service:
        name: docker
        state: started
        enabled: yes
    - name: Log completion
      debug:
        msg: "Docker Configuration attempted"
  become: true
  tags:
    - docker_config
    - docker