---

- name: Include wipe tasks
  ansible.builtin.include_tasks: wipe.yml
  tags:
    - web_app_wipe

- name: Deploy application with Docker Compose
  become: true
  tags:
    - app_deploy
    - compose
  block:
    - name: Create app directory
      ansible.builtin.file:
        path: "{{ web_app_compose_project_dir }}"
        state: directory
        mode: '0755'

    - name: Template docker-compose file
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ web_app_compose_project_dir }}/docker-compose.yml"
        mode: '0644'

    - name: Install docker-compose
      ansible.builtin.apt:
        name: docker-compose-plugin
        state: present

    - name: Log in to Docker Hub
      community.docker.docker_login:
        username: "{{ dockerhub_username }}"
        password: "{{ dockerhub_password }}"
        registry_url: https://index.docker.io/v1/
      no_log: true

    - name: Pull Docker image
      community.docker.docker_image:
        name: "{{ web_app_docker_image }}:{{ web_app_docker_image_tag }}"
        source: pull

    - name: Deploy with docker-compose
      community.docker.docker_compose_v2:
        project_src: "{{ web_app_compose_project_dir }}"
        state: present
        recreate: always
        pull: always

    - name: Wait for application to be ready
      ansible.builtin.wait_for:
        port: "{{ app_port }}"
        delay: 3
        timeout: 30

    - name: Verify health endpoint
      ansible.builtin.uri:
        url: "http://localhost:{{ app_port }}/health"
        method: GET
        status_code: 200
      register: web_app_health_check
      until: web_app_health_check.status == 200
      retries: 5
      delay: 2
    - name: Log completion
      ansible.builtin.debug:
        msg: "Deploy completed"
  rescue:
    - name: Log completion
      ansible.builtin.debug:
        msg: "Deploy failed"

    - name: Fail the playbook
      ansible.builtin.fail:
        msg: "Deployment failed"
  always:
    - name: Log completion
      ansible.builtin.debug:
        msg: "Deploy attempted"
