---
- name: Update apt cache with handling
  block:
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

  rescue:
    - name: Fix apt cache on failure
      command: apt-get update --fix-missing
      
  always:
    - name: Log completion
      debug:
        msg: "Apt cache update attempted"
      
  become: true
  tags:
    - packages
    - common

- name: Install common packages with handling
  block:
    - name: Install common packages
      apt:
        name: "{{ common_packages }}"
        state: present

  rescue:
    - name: Retry with force
      apt:
        name: "{{ common_packages }}"
        state: present
        force_apt_get: true
      
  always:
    - name: Log completion
      debug:
        msg: "Install common packages attempted"
      
  become: true
  tags:
    - packages
    - common


- name: Set timezone to UTC
  timezone:
    name: UTC
  become: true
  tags:
  - common
  - users